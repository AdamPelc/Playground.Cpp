name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.preset }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        preset: [release, debug, rel_with_deb_info]
        include:
          # ASAN/UBSAN only on Ubuntu (not supported on Windows with MSVC)
          - os: ubuntu-latest
            preset: asan_ubsan
          # TSAN only on Ubuntu
          - os: ubuntu-latest
            preset: tsan

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup vcpkg environment
      run: |
        echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV
      shell: bash

    - name: Configure CMake
      run: cmake --preset ${{ matrix.preset }}

    - name: Build
      run: cmake --build out/build/${{ matrix.preset }} --parallel

    - name: Run tests
      working-directory: out/build/${{ matrix.preset }}
      run: ctest --output-on-failure --parallel
